[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fmt]
line_length = 120
tab_width   = 4
bracket_spacing = false
int_types = "long"
multiline_func_headers = "params_first"
quote_style = "double"
number_underscore = "thousands"

[fuzz]
runs = 64
